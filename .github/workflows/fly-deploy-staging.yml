# Deploy staging to Fly.io after CI completes successfully on develop.
# Same gating pattern as fly-deploy.yml: ungated push triggers shipped
# broken builds in the past, so this waits on a green CI run.
name: Fly Deploy (Staging)

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    concurrency: deploy-frontend-staging
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (Staging)
        run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
