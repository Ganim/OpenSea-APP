name: CI

on:
  push:
    branches: ['*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'

concurrency:
  group: ci-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs ESLint, Prettier format check, and TypeScript type checking
  # to catch code quality issues early before attempting a build.
  lint-format-typecheck:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # Performs a full Next.js production build to ensure the app compiles
  # without errors. Runs in parallel to lint/typecheck so a lint failure
  # cannot mask real build/TS errors (the previous wiring of "needs:
  # lint-format-typecheck" caused 5+ broken deploys to ship to Fly because
  # CI was skipping this job).
  # Caches .next/cache to speed up subsequent builds.
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3333
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-cache-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css') }}
          restore-keys: |
            nextjs-cache-${{ hashFiles('package-lock.json') }}-
            nextjs-cache-

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: test -d .next

  # Runs Storybook stories as Vitest tests in a real browser (Playwright).
  # Blocks the PR on accessibility violations (serious/critical) because
  # parameters.a11y.test === 'error' in .storybook/preview.tsx.
  # Runs in parallel to lint/typecheck (see comment on `build` above).
  storybook-tests:
    name: Storybook a11y + smoke tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Storybook tests (a11y gate)
        run: npm run test:storybook

  # Reports Storybook coverage drift (components touched without story update).
  # Warn-only: matches the project's pre-commit hook policy. Fails the step
  # only on hard regressions in the script itself.
  storybook-coverage:
    name: Storybook coverage (warn-only)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Storybook coverage report
        run: npm run storybook:coverage
