# Storybook Warm-up
#
# Mantém o app Fly aquecido durante horário de trabalho BRT (Mon-Fri 8:00–19:00).
# Trade-off: gasta uma fração da quota Fly free em troca de eliminar cold start de
# ~20s para os agentes.
#
# Schedule: a cada 30 minutos, das 11:00 às 22:00 UTC, segunda a sexta
# (= 8:00 às 19:00 BRT, horário comercial). UTC é o único timezone aceito por
# GitHub Actions cron.
#
# Para desabilitar: deletar este arquivo OU comentar todo o bloco `schedule:`.

name: Storybook Warm-up

on:
  schedule:
    # Every 30 minutes, 11:00–22:00 UTC, Mon–Fri
    - cron: '*/30 11-21 * * 1-5'
    # Cobre também 22:00 UTC (= 19:00 BRT) sem estourar para 23:00
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

concurrency:
  group: storybook-warmup
  cancel-in-progress: true

jobs:
  ping:
    name: Ping Storybook to keep machine warm
    runs-on: ubuntu-latest
    steps:
      - name: Curl root
        run: |
          set -uo pipefail
          echo "==> Pinging https://opensea-storybook.fly.dev/ to prevent cold start"
          # Use || true: cold start raro pode dar 5xx por 1-2s antes da máquina subir;
          # não queremos spam de Actions failures por isso. O tempo de resposta vai
          # para o log de qualquer forma.
          curl -fsSL --max-time 60 \
            -o /dev/null \
            -w "HTTP %{http_code} | total %{time_total}s | connect %{time_connect}s\n" \
            https://opensea-storybook.fly.dev/ || true
          echo "==> Warm-up ping finished"
